openapi: 3.1.0
info:
  title: sedekah.je API
  description: |
    Public API for sedekah.je — a community-driven directory of QR codes for mosques, suraus, and other religious institutions in Malaysia.

    These endpoints are open and do not require authentication or API keys. Please be respectful with usage.

    ## MCP Server (Model Context Protocol)

    sedekah.je exposes an [MCP](https://modelcontextprotocol.io) server that lets AI assistants query institutions directly. The server is read-only, requires no authentication, and uses the Streamable HTTP transport.

    **Endpoint:** `https://sedekah.je/api/mcp`

    ### Connect from Claude Desktop

    Add to your `claude_desktop_config.json`:

    ```json
    {
      "mcpServers": {
        "sedekah-je": {
          "url": "https://sedekah.je/api/mcp"
        }
      }
    }
    ```

    ### Connect from Cursor

    Add to your `.cursor/mcp.json`:

    ```json
    {
      "mcpServers": {
        "sedekah-je": {
          "url": "https://sedekah.je/api/mcp"
        }
      }
    }
    ```

    ### Available MCP Tools

    | Tool | Description | Parameters |
    |------|-------------|------------|
    | `list_filter_options` | Returns all available filter values (categories, states, payment methods) | None |
    | `search_institutions` | Search and filter approved institutions with pagination | `search?`, `category?`, `state?`, `payment_method?`, `page?`, `limit?` |
    | `get_institution` | Get full details of a specific institution | `slug` (required) |
    | `get_random_institution` | Returns one random approved institution | None |
  version: 1.0.0
  contact:
    name: sedekah.je
    url: https://sedekah.je

tags:
  - name: Institutions
    description: Query and filter the institution directory
  - name: MCP
    description: Model Context Protocol endpoint for AI assistants

servers:
  - url: https://sedekah.je
    description: Production

paths:
  /api/institutions:
    get:
      operationId: listInstitutions
      summary: List institutions
      description: |
        Returns a paginated, filtered list of approved institutions. Results are cached for up to 5 minutes.
      tags:
        - Institutions
      parameters:
        - name: search
          in: query
          description: Search by name, description, or city (case-insensitive)
          schema:
            type: string
            example: "masjid negara"
        - name: category
          in: query
          description: Filter by category. Supports comma-separated values.
          schema:
            type: string
            enum:
              - masjid
              - surau
              - tahfiz
              - kebajikan
              - lain-lain
            example: "masjid,surau"
        - name: state
          in: query
          description: Filter by Malaysian state
          schema:
            type: string
            enum:
              - Johor
              - Kedah
              - Kelantan
              - Melaka
              - Negeri Sembilan
              - Pahang
              - Perak
              - Perlis
              - Pulau Pinang
              - Sabah
              - Sarawak
              - Selangor
              - Terengganu
              - W.P. Kuala Lumpur
              - W.P. Labuan
              - W.P. Putrajaya
            example: "Selangor"
        - name: page
          in: query
          description: Page number (starts at 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (max 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
      responses:
        "200":
          description: Paginated list of institutions
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, s-maxage=300, stale-while-revalidate=86400"
          content:
            application/json:
              schema:
                type: object
                properties:
                  institutions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Institution"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
              example:
                institutions:
                  - id: 1
                    name: "Masjid Negara"
                    slug: "masjid-negara"
                    description: "Masjid kebangsaan Malaysia"
                    category: "masjid"
                    state: "W.P. Kuala Lumpur"
                    city: "Kuala Lumpur"
                    qrImage: "https://example.com/qr.png"
                    qrContent: "00020101021126..."
                    supportedPayment: ["duitnow"]
                    coords: [3.1412, 101.6865]
                pagination:
                  page: 1
                  limit: 15
                  total: 120
                  hasMore: true
                  totalPages: 8
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Failed to fetch institutions"

  /api/mcp:
    post:
      operationId: mcpRequest
      summary: MCP Server
      description: |
        Model Context Protocol endpoint for AI assistants. Uses JSON-RPC 2.0 over Streamable HTTP transport.

        This endpoint is designed to be consumed by MCP clients (Claude Desktop, Cursor, etc.) — not called directly. See the MCP section above for connection instructions.

        **Example: Initialize**
        ```json
        {
          "jsonrpc": "2.0",
          "id": 1,
          "method": "initialize",
          "params": {
            "protocolVersion": "2025-03-26",
            "capabilities": {},
            "clientInfo": { "name": "example", "version": "1.0.0" }
          }
        }
        ```

        **Example: Call a tool**
        ```json
        {
          "jsonrpc": "2.0",
          "id": 2,
          "method": "tools/call",
          "params": {
            "name": "search_institutions",
            "arguments": { "state": "Selangor", "category": "masjid" }
          }
        }
        ```
      tags:
        - MCP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, method]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  oneOf:
                    - type: string
                    - type: integer
                method:
                  type: string
                  description: "MCP method (e.g. initialize, tools/list, tools/call)"
                  enum:
                    - initialize
                    - tools/list
                    - tools/call
                params:
                  type: object
                  description: Method-specific parameters
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                  id:
                    oneOf:
                      - type: string
                      - type: integer
                  result:
                    type: object
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  protocolVersion: "2025-03-26"
                  capabilities:
                    tools: {}
                  serverInfo:
                    name: "sedekah-je"
                    version: "1.0.0"

  /api/random:
    get:
      operationId: getRandomInstitution
      summary: Get a random institution
      description: |
        Returns one randomly selected approved institution. Never cached — each request returns a fresh result. Open CORS.
      tags:
        - Institutions
      responses:
        "200":
          description: A random institution
          headers:
            Cache-Control:
              schema:
                type: string
                example: "no-cache, no-store, must-revalidate"
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstitutionCompact"
              example:
                id: 42
                name: "Surau Al-Hidayah"
                category: "surau"
                state: "Selangor"
                city: "Shah Alam"
                qrImage: "https://example.com/qr.png"
                qrContent: "00020101021126..."
                supportedPayment: ["duitnow", "tng"]
                coords: [3.0733, 101.5185]
        "404":
          description: No institutions found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "No institutions found"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal server error"

components:
  schemas:
    Institution:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [masjid, surau, tahfiz, kebajikan, lain-lain]
        state:
          type: string
        city:
          type: string
        qrImage:
          type: string
          nullable: true
          description: URL to the QR code image
        qrContent:
          type: string
          nullable: true
          description: Raw QR code payload
        supportedPayment:
          type: array
          nullable: true
          items:
            type: string
            enum: [duitnow, tng, boost]
        coords:
          type: array
          nullable: true
          description: "[latitude, longitude]"
          items:
            type: number
          minItems: 2
          maxItems: 2

    InstitutionCompact:
      type: object
      description: Same as Institution but without slug and description
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [masjid, surau, tahfiz, kebajikan, lain-lain]
        state:
          type: string
        city:
          type: string
        qrImage:
          type: string
          nullable: true
        qrContent:
          type: string
          nullable: true
        supportedPayment:
          type: array
          nullable: true
          items:
            type: string
            enum: [duitnow, tng, boost]
        coords:
          type: array
          nullable: true
          items:
            type: number
          minItems: 2
          maxItems: 2

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
        totalPages:
          type: integer
